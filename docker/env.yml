# Conda environment for the Monty + Habitat-Sim Docker image.
# Mirrors the recommended install path from the Monty docs but pinned
# tighter so the image is reproducible.
name: base
channels:
  - aihabitat
  - conda-forge
  - nodefaults
dependencies:
  - python=3.9
  - pip
  - numpy<2
  - scipy
  - scikit-learn
  - matplotlib
  - pandas
  - tqdm
  - pyyaml
  - quaternion
  - habitat-sim=0.3.1=*headless*
  - withbullet
